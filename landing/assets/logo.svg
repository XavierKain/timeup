<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TimeUp">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11131c"/>
      <stop offset="1" stop-color="#05060a"/>
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="420" x2="392" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.7">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- squircle -->
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#glow)"/>
  <rect x="16.5" y="16.5" width="479" height="479" rx="115.5" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- stopwatch top button -->
  <rect x="232" y="92" width="48" height="34" rx="14" fill="url(#accent)"/>
  <rect x="246" y="74" width="20" height="30" rx="9" fill="url(#accent)"/>

  <!-- timer ring (gap at top for the stem) -->
  <path d="M256 150
           a138 138 0 1 0 0.1 0"
        stroke="url(#accent)" stroke-width="30" stroke-linecap="round" fill="none"
        stroke-dasharray="812 60" stroke-dashoffset="-30"/>

  <!-- upward arrow (Time → Up) -->
  <path d="M256 372 V214" stroke="#ffffff" stroke-width="30" stroke-linecap="round"/>
  <path d="M198 264 L256 206 L314 264" stroke="#ffffff" stroke-width="30"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
